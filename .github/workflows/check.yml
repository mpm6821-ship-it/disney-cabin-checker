name: Disney Cabin Availability Checker

on:
  schedule:
    # Hourly. Disney inventory does not turn over fast enough to justify
    # hammering it every 10 minutes, and a lighter footprint is less likely
    # to get the runner blocked.
    - cron: '0 * * * *'
  workflow_dispatch:

# Never let a slow run overlap the next scheduled one.
concurrency:
  group: cabin-check
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out the repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Install Chromium
        # The full Chromium build, not headless-shell: Disney's edge rejects
        # headless-shell with ERR_HTTP2_PROTOCOL_ERROR.
        run: python -m playwright install --with-deps chromium

      - name: Run availability checker
        env:
          # Dates are configuration, not secrets -- edit them here.
          CHECK_IN_DATE: '2026-12-01'
          CHECK_OUT_DATE: '2026-12-05'
          ADULTS: '2'
          PUSHOVER_USER_KEY: ${{ secrets.PUSHOVER_USER_KEY }}
          PUSHOVER_API_TOKEN: ${{ secrets.PUSHOVER_API_TOKEN }}
        run: python checker.py

      - name: Upload failure screenshot
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshot
          path: failure.png
          if-no-files-found: ignore
          retention-days: 7
